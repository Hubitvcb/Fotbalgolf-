<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FotbalPark Hluboká – Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gd: #1a3a1f; --gm: #2d6a35; --gb: #76c442;
  --acc: #f0b429; --red: #e53935; --wh: #f5f5f0;
}
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--gd); color: var(--wh); min-height: 100vh;
  background-image:
    repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0,transparent 2px,transparent 40px,rgba(255,255,255,.012) 42px),
    repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0,transparent 2px,transparent 60px,rgba(0,0,0,.07) 62px);
}
.app { max-width:560px; margin:0 auto; padding:0 16px 60px; }

/* HEADER */
header { text-align:center; padding:24px 0 16px; }
.logo-wrap {
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:#fff; border-radius:14px; padding:12px 20px; margin-bottom:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.logo-img { height:52px; object-fit:contain; }
.logo-main { font-family:'Oswald',sans-serif; font-size:18px; font-weight:700; color:#1a3a1f; letter-spacing:1px; line-height:1.1; }
.logo-sub  { font-size:12px; color:#666; }
.ball-icon { font-size:36px; display:block; animation:bounce 2.2s ease-in-out infinite; margin-bottom:2px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
header h1 { font-family:'Oswald',sans-serif; font-size:clamp(22px,6vw,32px); font-weight:700; letter-spacing:2px; text-transform:uppercase; text-shadow:0 2px 10px rgba(0,0,0,.5); }
header h1 span { color:var(--gb); }

/* SCREENS — only #setup-screen visible by default */
.screen { display:none; }
#setup-screen { display:block; }

/* CARD */
.card { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:16px; padding:22px; margin-bottom:16px; }
.card-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--gb); font-weight:600; margin-bottom:14px; }
.field-label { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gb); font-weight:600; display:block; margin-bottom:5px; }
.text-input { width:100%; background:#fff; border:2px solid #d0d0d0; border-radius:9px; padding:11px 14px; color:#111; font-family:'Source Sans 3',sans-serif; font-size:15px; outline:none; transition:border-color .2s; }
.text-input:focus { border-color:var(--gb); }
.text-input::placeholder { color:#aaa; }
.prow { display:flex; align-items:flex-end; gap:8px; margin-top:12px; }
.prow .text-input { flex:1; }
.rm-btn { background:none; border:1px solid rgba(255,255,255,.2); border-radius:8px; color:rgba(255,255,255,.45); font-size:18px; cursor:pointer; padding:10px 12px; line-height:1; transition:all .2s; }
.rm-btn:hover { color:var(--red); border-color:var(--red); }
.add-btn { width:100%; margin-top:14px; padding:11px; background:transparent; border:2px dashed rgba(255,255,255,.25); border-radius:10px; color:rgba(255,255,255,.55); font-family:'Source Sans 3',sans-serif; font-size:14px; cursor:pointer; transition:all .2s; }
.add-btn:hover { border-color:var(--gb); color:var(--gb); }
.start-btn { width:100%; margin-top:18px; padding:15px; background:linear-gradient(135deg,var(--gm),var(--gb)); border:none; border-radius:12px; color:#0f2412; font-family:'Oswald',sans-serif; font-size:19px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; box-shadow:0 4px 18px rgba(76,175,80,.3); }
.start-btn:hover { transform:translateY(-2px); box-shadow:0 6px 26px rgba(76,175,80,.45); }

/* HOLE HEADER */
.hole-hdr { background:linear-gradient(135deg,#1f4d26,#2d6a35); border:1px solid rgba(118,196,66,.3); border-radius:14px; padding:16px 20px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
.lbl-sm { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:rgba(255,255,255,.55); font-weight:600; }
.hole-big { font-family:'Oswald',sans-serif; font-size:40px; font-weight:700; line-height:1; }
.par-big  { font-family:'Oswald',sans-serif; font-size:40px; font-weight:700; color:var(--acc); line-height:1; }

/* DOTS */
.dots { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
.dot { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.13); cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:transparent; }
.dot.active { background:var(--gb); border-color:var(--gb); color:#0f2412; }
.dot.done   { background:var(--gm); border-color:var(--gb); color:rgba(255,255,255,.85); }

/* PLAYER ROWS */
.players-card { background:#fff; border-radius:14px; overflow:hidden; margin-bottom:14px; box-shadow:0 4px 20px rgba(0,0,0,.25); }
.prow-game { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #e8e8e8; }
.prow-game:last-child { border-bottom:none; }
.av { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; color:#fff; flex-shrink:0; }
.av0{background:#388E3C} .av1{background:#1976D2} .av2{background:#F57C00} .av3{background:#C2185B} .av4{background:#7B1FA2} .av5{background:#00838F}
.pname-col { flex:1; min-width:0; }
.pname  { font-weight:600; font-size:16px; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ptot   { font-size:12px; color:#888; margin-top:1px; }
.pu{color:#2e7d32;font-weight:700} .po{color:#c62828;font-weight:700} .pp{color:#888;font-weight:700}
.sc-grp { display:flex; align-items:center; gap:6px; }
.sc-btn { width:36px; height:36px; border-radius:50%; border:2px solid #d0d0d0; background:#f5f5f5; color:#333; font-size:20px; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sc-btn.m:hover{border-color:#e53935;color:#e53935;background:#fff5f5}
.sc-btn.p:hover{border-color:#388E3C;color:#388E3C;background:#f1fff2}
.sc-btn:active{transform:scale(.88)}
.sc-inp { width:58px; height:42px; background:#fff; border:2px solid #bbb; border-radius:9px; color:#111; font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; text-align:center; outline:none; transition:border-color .2s; -moz-appearance:textfield; }
.sc-inp::-webkit-outer-spin-button,.sc-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sc-inp:focus{border-color:#388E3C;box-shadow:0 0 0 3px rgba(56,142,60,.15)}
.badge { font-size:11px; font-weight:700; padding:3px 7px; border-radius:5px; white-space:nowrap; min-width:46px; text-align:center; }
.be{background:#1565C0;color:#fff} .bb{background:#2e7d32;color:#fff}
.bp{background:#e0e0e0;color:#555} .bo{background:#e65100;color:#fff}
.bd{background:#b71c1c;color:#fff} .bx{background:#f0f0f0;color:#bbb}

/* NAV */
.nav-row { display:flex; gap:10px; margin-bottom:14px; }
.nav-btn { padding:14px 16px; border-radius:11px; font-family:'Oswald',sans-serif; font-size:16px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; border:none; }
.nb-prev { background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.18)!important; color:var(--wh); width:54px; flex-shrink:0; font-size:20px; }
.nb-prev:hover:not([disabled]){background:rgba(255,255,255,.16)}
.nb-prev[disabled]{opacity:.3;cursor:default}
.nb-next { flex:1; background:linear-gradient(135deg,var(--gm),var(--gb)); color:#0f2412; box-shadow:0 3px 14px rgba(76,175,80,.35); }
.nb-next:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(76,175,80,.5)}
.nb-fin  { flex:1; background:var(--acc); color:#0f2412; box-shadow:0 3px 14px rgba(240,180,41,.35); }
.nb-fin:hover{opacity:.9;transform:translateY(-2px)}

/* SCORECARD */
.sc-wrap { background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.08); border-radius:14px; overflow:hidden; margin-bottom:16px; }
.sc-ttl  { background:rgba(255,255,255,.05); padding:10px 16px; font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--gb); font-weight:600; }
.sc-tbl  { width:100%; border-collapse:collapse; font-size:12px; }
.sc-tbl th,.sc-tbl td { padding:7px 8px; text-align:center; border-bottom:1px solid rgba(255,255,255,.05); }
.sc-tbl th { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.4); font-weight:600; }
.sc-tbl td:first-child,.sc-tbl th:first-child { text-align:left; padding-left:14px; }
.sc-tbl tr:last-child td{border-bottom:none}
.ct{font-weight:700;color:var(--acc);font-family:'Oswald',sans-serif;font-size:14px}
td.ce{color:#64b5f6;font-weight:700} td.cb{color:#81c784;font-weight:700}
td.co{color:#ffb74d} td.cd{color:#ef9a9a}
td.cx{color:rgba(255,255,255,.18)} td.cc{text-decoration:underline;font-weight:900}

/* ACTION ROW */
.act-row { display:flex; gap:10px; }
.act-btn { flex:1; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); color:var(--wh); font-family:'Source Sans 3',sans-serif; font-size:14px; cursor:pointer; transition:all .2s; }
.act-btn:hover{background:rgba(255,255,255,.12)}
.act-btn.dng:hover{background:rgba(229,57,53,.15);border-color:var(--red);color:var(--red)}

/* RESULTS */
.res-title { font-family:'Oswald',sans-serif; font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:2px; text-align:center; margin-bottom:4px; }
.res-sub   { text-align:center; color:rgba(255,255,255,.5); font-size:13px; margin-bottom:20px; }
.podium { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin:20px 0 24px; }
.pod-blk { display:flex; flex-direction:column; align-items:center; gap:6px; }
.pod-name { font-size:12px; font-weight:600; text-align:center; max-width:78px; word-break:break-word; }
.pod-sc { font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; }
.pod-stand { width:76px; border-radius:7px 7px 0 0; display:flex; align-items:center; justify-content:center; font-size:26px; }
.sg{background:var(--acc);height:88px} .ss{background:#9e9e9e;height:62px} .sb{background:#795548;height:44px}
.rt-wrap { background:rgba(0,0,0,.22); border-radius:14px; overflow:hidden; margin-bottom:16px; border:1px solid rgba(255,255,255,.08); }
.rt { width:100%; border-collapse:collapse; }
.rt th,.rt td { padding:10px 14px; text-align:left; border-bottom:1px solid rgba(255,255,255,.05); }
.rt th { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.4); font-weight:600; }
.rt tr:last-child td{border-bottom:none}
.rt .rk{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;width:36px}
.rt .rv{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--acc)}
.rt .rd{font-weight:700}
.rt tr.wr td{background:rgba(240,180,41,.07)}

/* INSTAGRAM */
.ig-btn { width:100%; padding:14px; border-radius:12px; border:none; margin-bottom:10px; background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color:#fff; font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 18px rgba(131,58,180,.4); }
.ig-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(131,58,180,.55)}

/* SHARE OVERLAY */
#share-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px; }
#share-ov.open{display:flex}
#share-cv { border-radius:10px; width:100%; max-width:320px; box-shadow:0 8px 40px rgba(0,0,0,.6); }
.sh-hint  { font-size:12px; color:rgba(255,255,255,.6); text-align:center; max-width:300px; line-height:1.5; }
.sh-acts  { display:flex; gap:10px; }
.sh-dl  { padding:13px 22px; border-radius:10px; border:none; cursor:pointer; font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color:#fff; }
.sh-cl  { padding:13px 18px; border-radius:10px; border:1px solid rgba(255,255,255,.3); background:transparent; color:#fff; font-family:'Oswald',sans-serif; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo-wrap">
    <img class="logo-img" src="https://www.fotbalparkhluboka.cz/img/0000-Global/images/logo-course/FP-Hluboka-pro-gscore_main-logo.png" alt="FotbalPark" onerror="this.style.display='none'">
    <div>
      <div class="logo-main">FotbalPark</div>
      <div class="logo-sub">Hluboká nad Vltavou</div>
    </div>
  </div>
  <span class="ball-icon">⚽</span>
  <h1>Fotbal<span>golf</span></h1>
</header>

<!-- SETUP -->
<div id="setup-screen" class="screen" style="display:block">
  <div class="card">
    <div class="card-title">⛳ FotbalPark Hluboká nad Vltavou · 18 jamek · Par 72</div>
  </div>
  <div class="card">
    <div class="card-title">👥 Hráči</div>
    <div id="plist">
      <div class="prow" id="pr0">
        <div style="flex:1">
          <label class="field-label">Hráč 1</label>
          <input type="text" class="text-input pi" placeholder="Jméno hráče" id="pi0">
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="addP()">＋ Přidat hráče</button>
  </div>
  <button class="start-btn" onclick="startGame()">⛳ Zahájit hru</button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="hole-hdr">
    <div><div class="lbl-sm">Jamka</div><div class="hole-big" id="hnum">1</div></div>
    <div style="text-align:center"><div class="lbl-sm">Par</div><div class="par-big" id="pnum">3</div></div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="players-card" id="pinputs"></div>
  <div class="nav-row">
    <button class="nav-btn nb-prev" id="btnPrev" onclick="chHole(-1)" disabled>◀</button>
    <button class="nav-btn nb-next" id="btnNext" onclick="chHole(1)">Další jamka ▶</button>
  </div>
  <div class="sc-wrap">
    <div class="sc-ttl">📋 Průběžná tabulka</div>
    <div style="overflow-x:auto"><table class="sc-tbl" id="sctbl"></table></div>
  </div>
  <div class="act-row">
    <button class="act-btn dng" onclick="nova()">↺ Nová hra</button>
    <button class="act-btn" style="background:var(--acc);color:#0f2412;font-weight:700;border:none" onclick="showResults()">🏆 Výsledky</button>
  </div>
</div>

<!-- RESULTS -->
<div id="result-screen" class="screen">
  <div class="res-title">🏆 Výsledky</div>
  <div class="res-sub">FotbalPark Hluboká nad Vltavou · 18 jamek · Par 72</div>
  <div class="podium" id="podium"></div>
  <div class="rt-wrap"><table class="rt" id="rtbl"></table></div>
  <button class="ig-btn" onclick="openShare()">📸 Sdílet výsledky – stáhnout obrázek</button>
  <div class="act-row">
    <button class="act-btn" onclick="backToGame()">◀ Zpět do hry</button>
    <button class="act-btn" style="background:var(--gm);color:#fff;font-weight:700;border:none" onclick="nova()">↺ Nová hra</button>
  </div>
</div>

</div><!-- /app -->

<!-- SHARE OVERLAY -->
<div id="share-ov">
  <canvas id="share-cv"></canvas>
  <p class="sh-hint" id="sh-hint">Klepni Stáhnout → ulož obrázek → sdílej na Instagramu</p>
  <div class="sh-acts">
    <button class="sh-dl" onclick="dlImage()">⬇ Stáhnout obrázek</button>
    <button class="sh-cl" onclick="closeShare()">✕ Zavřít</button>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────
const PARS = [3,4,3,5,5,4,4,3,4,3,3,3,3,4,6,4,5,6];
const NH   = 18;
const AVC  = ['av0','av1','av2','av3','av4','av5'];
const AVCOL= ['#388E3C','#1976D2','#F57C00','#C2185B','#7B1FA2','#00838F'];

// ── STATE ────────────────────────────────────────────
let players = [];
let scores  = [];  // scores[pi][hole] = number|null
let hole    = 0;
let pcount  = 1;

// ── HELPERS ──────────────────────────────────────────
const ini = n => n.trim() ? n.trim().slice(0,2).toUpperCase() : '?';

function show(id) {
  ['setup-screen','game-screen','result-screen'].forEach(s => {
    document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
  });
}

// ── SETUP ────────────────────────────────────────────
function addP() {
  if (pcount >= 6) return;
  const list = document.getElementById('plist');
  const d = document.createElement('div');
  d.className = 'prow'; d.id = 'pr' + pcount;
  d.innerHTML = `<div style="flex:1"><label class="field-label">Hráč ${pcount+1}</label>
    <input type="text" class="text-input pi" id="pi${pcount}" placeholder="Jméno hráče"></div>
    <button class="rm-btn" onclick="rmP(${pcount})">✕</button>`;
  list.appendChild(d);
  pcount++;
}

function rmP(i) {
  const el = document.getElementById('pr' + i);
  if (el) el.remove();
}

function startGame() {
  const inputs = document.querySelectorAll('.pi');
  players = [];
  inputs.forEach((el, i) => players.push(el.value.trim() || 'Hráč ' + (i+1)));
  if (!players.length) { alert('Přidej aspoň jednoho hráče!'); return; }
  scores = players.map(() => Array(NH).fill(null));
  hole = 0;
  show('game-screen');
  render();
}

// ── NOVA HRA ─────────────────────────────────────────
function nova() {
  if (!confirm('Opravdu začít novou hru? Všechna data budou smazána.')) return;

  // 1. Reset state completely
  players = [];
  scores  = [];
  hole    = 0;
  pcount  = 1;

  // 2. Rebuild setup form from scratch
  document.getElementById('plist').innerHTML =
    `<div class="prow" id="pr0"><div style="flex:1">
      <label class="field-label">Hráč 1</label>
      <input type="text" class="text-input pi" id="pi0" placeholder="Jméno hráče">
    </div></div>`;

  // 3. Clear all game/result UI
  document.getElementById('dots').innerHTML = '';
  document.getElementById('pinputs').innerHTML = '';
  document.getElementById('sctbl').innerHTML = '';
  document.getElementById('podium').innerHTML = '';
  document.getElementById('rtbl').innerHTML = '';

  // 4. Reset nav buttons
  const nb = document.getElementById('btnNext');
  nb.textContent = 'Další jamka ▶';
  nb.className = 'nav-btn nb-next';
  nb.onclick = function(){ chHole(1); };
  document.getElementById('btnPrev').disabled = true;

  // 5. Show setup
  show('setup-screen');
}

// ── RENDER ───────────────────────────────────────────
function render() {
  document.getElementById('hnum').textContent = hole + 1;
  document.getElementById('pnum').textContent = PARS[hole];
  renderDots();
  renderInputs();
  renderTable();
  updateNav();
}

function renderDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  for (let i = 0; i < NH; i++) {
    const d = document.createElement('div');
    const done = scores.some(s => s[i] !== null);
    d.className = 'dot' + (i===hole?' active': done?' done':'');
    d.textContent = i+1;
    d.style.color = i===hole ? '#0f2412' : done ? 'rgba(255,255,255,.85)' : 'transparent';
    d.onclick = () => goHole(i);
    c.appendChild(d);
  }
}

function renderInputs() {
  const par = PARS[hole];
  const c   = document.getElementById('pinputs');
  c.innerHTML = '';
  players.forEach((name, pi) => {
    const sc    = scores[pi][hole];
    const diff  = sc !== null ? sc - par : null;
    const bg    = getBadge(diff);
    const tot   = scores[pi].reduce((s,v) => v!==null?s+v:s, 0);
    const pp    = scores[pi].reduce((s,v,i) => v!==null?s+PARS[i]:s, 0);
    const has   = scores[pi].some(v => v!==null);
    const od    = has ? tot - pp : null;
    const odH   = od!==null
      ? `<span class="${od<0?'pu':od>0?'po':'pp'}">${od>0?'+':''}${od} celkem</span>` : '';
    const row = document.createElement('div');
    row.className = 'prow-game';
    row.innerHTML = `
      <div class="av ${AVC[pi%AVC.length]}">${ini(name)}</div>
      <div class="pname-col">
        <div class="pname">${name}</div>
        <div class="ptot" id="ptot${pi}">${has?tot+' kopů ':' '}${odH}</div>
      </div>
      <div class="sc-grp">
        <button class="sc-btn m" onclick="adj(${pi},-1)">−</button>
        <input type="number" min="1" max="30" class="sc-inp" id="si${pi}"
          value="${sc!==null?sc:''}" placeholder="—"
          oninput="onIn(${pi},this.value)"
          onkeydown="if(event.key==='Enter')nextFocus(${pi})">
        <button class="sc-btn p" onclick="adj(${pi},1)">＋</button>
        <span class="badge ${bg.c}" id="bdg${pi}">${bg.t}</span>
      </div>`;
    c.appendChild(row);
  });
}

function getBadge(d) {
  if (d===null) return {c:'bx',t:'—'};
  if (d<=-2)    return {c:'be',t:'Eagle'};
  if (d===-1)   return {c:'bb',t:'Birdie'};
  if (d===0)    return {c:'bp',t:'Par'};
  if (d===1)    return {c:'bo',t:'Bogey'};
  return          {c:'bd',t:'+'+d};
}

function onIn(pi, val) {
  const n = parseInt(val,10);
  scores[pi][hole] = (!val||isNaN(n)||n<1) ? null : n;
  refreshRow(pi); renderDots(); renderTable();
}

function adj(pi, delta) {
  const cur = scores[pi][hole] ?? 0;
  scores[pi][hole] = Math.max(1, cur+delta);
  const el = document.getElementById('si'+pi);
  if (el) el.value = scores[pi][hole];
  refreshRow(pi); renderDots(); renderTable();
}

function refreshRow(pi) {
  const par = PARS[hole], sc = scores[pi][hole];
  const bg  = getBadge(sc!==null?sc-par:null);
  const bd  = document.getElementById('bdg'+pi);
  if (bd) { bd.className='badge '+bg.c; bd.textContent=bg.t; }
  const tot = scores[pi].reduce((s,v)=>v!==null?s+v:s,0);
  const pp  = scores[pi].reduce((s,v,i)=>v!==null?s+PARS[i]:s,0);
  const has = scores[pi].some(v=>v!==null);
  const od  = has?tot-pp:null;
  const odH = od!==null?`<span class="${od<0?'pu':od>0?'po':'pp'}">${od>0?'+':''}${od} celkem</span>`:'';
  const pt  = document.getElementById('ptot'+pi);
  if (pt) pt.innerHTML = (has?tot+' kopů ':' ')+odH;
}

function nextFocus(pi) {
  const el = document.getElementById('si'+(pi+1));
  if (el) { el.focus(); el.select(); } else chHole(1);
}

function updateNav() {
  document.getElementById('btnPrev').disabled = hole === 0;
  const nb = document.getElementById('btnNext');
  if (hole === NH-1) {
    nb.textContent = '🏆 Zobrazit výsledky';
    nb.className = 'nav-btn nb-fin';
    nb.onclick = showResults;
  } else {
    nb.textContent = 'Další jamka ▶';
    nb.className = 'nav-btn nb-next';
    nb.onclick = function(){ chHole(1); };
  }
}

function chHole(d) { goHole(hole+d); }
function goHole(i) { if(i>=0&&i<NH){hole=i;render();} }

function renderTable() {
  const t = document.getElementById('sctbl');
  let h = '<thead><tr><th>Hráč</th>';
  for(let i=0;i<NH;i++) h+=`<th>${i+1}</th>`;
  h+='<th class="ct">∑</th><th class="ct" style="color:var(--gb)">±</th></tr></thead><tbody>';
  h+='<tr><td style="color:rgba(255,255,255,.4);font-size:11px">Par</td>';
  for(let i=0;i<NH;i++) h+=`<td style="color:rgba(255,255,255,.35);font-size:11px">${PARS[i]}</td>`;
  h+='<td class="ct" style="font-size:11px">72</td><td></td></tr>';
  players.forEach((name,pi)=>{
    h+=`<tr><td style="color:#fff;font-weight:600">${name}</td>`;
    for(let i=0;i<NH;i++){
      const s=scores[pi][i];
      if(!s){h+=`<td class="cx${i===hole?' cc':''}">·</td>`;continue;}
      const d=s-PARS[i];
      let cl=i===hole?'cc':'';
      if(d<=-2)cl+=' ce';else if(d===-1)cl+=' cb';else if(d===1)cl+=' co';else if(d>=2)cl+=' cd';
      h+=`<td class="${cl.trim()}">${s}</td>`;
    }
    const tot=scores[pi].reduce((s,v)=>v!==null?s+v:s,0);
    const pp=scores[pi].reduce((s,v,i)=>v!==null?s+PARS[i]:s,0);
    const has=scores[pi].some(v=>v!==null);
    const od=has?tot-pp:null;
    const ods=od!==null?(od>=0?'+':'')+od:'—';
    const odc=od!==null?(od<0?'var(--gb)':od>0?'#ffb74d':'rgba(255,255,255,.5)'):'rgba(255,255,255,.25)';
    h+=`<td class="ct">${has?tot:'—'}</td><td class="ct" style="color:${odc};font-size:13px">${ods}</td></tr>`;
  });
  h+='</tbody>';
  t.innerHTML=h;
}

// ── RESULTS ──────────────────────────────────────────
function getRanking() {
  return players.map((name,pi)=>{
    const tot=scores[pi].reduce((s,v)=>v!==null?s+v:s,0);
    const pp=scores[pi].reduce((s,v,i)=>v!==null?s+PARS[i]:s,0);
    const has=scores[pi].some(v=>v!==null);
    return {name,pi,tot,diff:has?tot-pp:9999,has};
  }).sort((a,b)=>a.tot-b.tot);
}

function showResults() {
  const rk = getRanking();
  show('result-screen');

  const pod=document.getElementById('podium'); pod.innerHTML='';
  const ord=rk.length>=3?[rk[1],rk[0],rk[2]]:rk.length===2?[rk[1],rk[0]]:[rk[0]];
  const sc2=['ss','sg','sb'], med=['🥈','🥇','🥉'];
  ord.forEach((r,i)=>{
    pod.innerHTML+=`<div class="pod-blk">
      <div class="pod-name">${r.name}</div>
      <div class="pod-sc">${r.has?r.tot:'—'}</div>
      <div class="pod-stand ${sc2[i]}">${med[i]}</div>
    </div>`;
  });

  const tbl=document.getElementById('rtbl');
  let h='<thead><tr><th>#</th><th>Hráč</th><th>Kopy</th><th>+/- Par</th></tr></thead><tbody>';
  rk.forEach((r,i)=>{
    const ds=r.has?(r.diff>=0?'+':'')+r.diff:'—';
    const dc=r.diff<0?'var(--gb)':r.diff>0?'#ffb74d':'rgba(255,255,255,.5)';
    const ml=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    h+=`<tr class="${i===0?'wr':''}">
      <td class="rk">${ml}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="av ${AVC[r.pi%AVC.length]}" style="width:26px;height:26px;font-size:11px">${ini(r.name)}</div>${r.name}
      </div></td>
      <td class="rv">${r.has?r.tot:'—'}</td>
      <td class="rd" style="color:${dc}">${ds}</td>
    </tr>`;
  });
  h+='</tbody>'; tbl.innerHTML=h;
}

function backToGame() { show('game-screen'); render(); }

// ── SHARE / DOWNLOAD ─────────────────────────────────
function openShare() {
  buildCanvas();
  document.getElementById('share-ov').classList.add('open');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  document.getElementById('sh-hint').textContent = isIOS
    ? 'iPhone: klepni Stáhnout → podrž obrázek v Safari → Uložit fotku'
    : 'Klepni Stáhnout → ulož obrázek → sdílej na Instagramu';
}

function closeShare() {
  document.getElementById('share-ov').classList.remove('open');
}

function buildCanvas() {
  const cv = document.getElementById('share-cv');
  const W=1080, H=1080;
  cv.width=W; cv.height=H;
  cv.style.width='100%'; cv.style.maxWidth='320px';
  const cx = cv.getContext('2d');
  const rk = getRanking();

  // BG
  const bg=cx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#1a3a1f'); bg.addColorStop(.5,'#2d6a35'); bg.addColorStop(1,'#1a3a1f');
  cx.fillStyle=bg; cx.fillRect(0,0,W,H);

  // Grid lines
  cx.strokeStyle='rgba(255,255,255,0.04)'; cx.lineWidth=2;
  for(let y=0;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  for(let x=0;x<W;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}

  // Header band
  cx.fillStyle='rgba(255,255,255,0.09)';
  rrect(cx,40,36,W-80,120,20); cx.fill();
  cx.fillStyle='#76c442';
  cx.font='bold 44px Arial, sans-serif'; cx.textAlign='left';
  cx.fillText('⚽ FotbalPark Hluboká nad Vltavou', 76, 96);
  cx.fillStyle='rgba(255,255,255,0.6)';
  cx.font='28px Arial, sans-serif';
  cx.fillText('18 jamek  ·  Par 72  ·  Fotbalgolf Scorecard', 76, 136);

  // Title
  cx.fillStyle='#ffffff';
  cx.font='bold 80px Arial, sans-serif'; cx.textAlign='center';
  cx.fillText('🏆 VÝSLEDKY', W/2, 260);

  // Date
  const ds=new Date().toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'});
  cx.fillStyle='rgba(255,255,255,0.45)'; cx.font='26px Arial, sans-serif';
  cx.fillText(ds, W/2, 304);

  // Player rows
  const sy=360, rh=114;
  const medals=['🥇','🥈','🥉','4.','5.','6.'];
  rk.forEach((r,idx)=>{
    const y=sy+idx*rh, win=idx===0;
    cx.fillStyle=win?'rgba(240,180,41,0.16)':'rgba(255,255,255,0.07)';
    rrect(cx,52,y,W-104,rh-8,16); cx.fill();
    if(win){cx.strokeStyle='rgba(240,180,41,0.55)';cx.lineWidth=2;rrect(cx,52,y,W-104,rh-8,16);cx.stroke();}

    // avatar
    cx.fillStyle=AVCOL[r.pi%AVCOL.length];
    cx.beginPath(); cx.arc(128,y+47,38,0,Math.PI*2); cx.fill();
    cx.fillStyle='#fff'; cx.font='bold 30px Arial'; cx.textAlign='center';
    cx.fillText(ini(r.name),128,y+57);

    // medal
    cx.font='bold 42px Arial'; cx.textAlign='left';
    cx.fillText(medals[idx],70,y+57);

    // name
    cx.fillStyle='#fff'; cx.font='bold 38px Arial'; cx.textAlign='left';
    cx.fillText(r.name,182,y+45);

    // score big
    cx.fillStyle='#f0b429'; cx.font='bold 52px Arial'; cx.textAlign='right';
    cx.fillText(r.has?r.tot:'—',W-110,y+52);

    // diff
    const ds=r.has?(r.diff>=0?'+':'')+r.diff:'—';
    cx.fillStyle=r.diff<0?'#76c442':r.diff>0?'#ffb74d':'rgba(255,255,255,0.5)';
    cx.font='bold 28px Arial'; cx.textAlign='right';
    cx.fillText(ds+' od par',W-110,y+86);
  });

  // Footer
  cx.fillStyle='rgba(255,255,255,0.22)'; cx.font='22px Arial'; cx.textAlign='center';
  cx.fillText('fotbalparkhluboka.cz', W/2, H-40);
}

function rrect(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
}

function dlImage() {
  const cv = document.getElementById('share-cv');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    // iOS Safari: open in new tab, user long-presses to save
    const url = cv.toDataURL('image/png');
    const w = window.open();
    w.document.write(`<html><body style="margin:0;background:#000">
      <p style="color:#fff;font-family:sans-serif;padding:12px;font-size:14px">
        Podrž obrázek prstem → Uložit fotku</p>
      <img src="${url}" style="width:100%;display:block">
      </body></html>`);
  } else {
    // Android / desktop: direct download
    cv.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'fotbalgolf-vysledky.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 3000);
    }, 'image/png');
  }
}
</script>
